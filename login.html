<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LOGIN</title>
        <link rel="stylesheet" href="./css/main.css" />

         <script src="./js/script.js"></script>

    </head>
    
    <body>
        <header class="cabecalho">
            <nav class="cabecalho__nav">
                <ul class="cabecalho__ul">
                    <li class="cabecalho__li cabecalho__li--active">
                        <a class="cabecalho__a cabecalho__a--active" href="./index.html"
                        >Home</a
                        >
                    </li>
                </ul>
            </nav>
        </header>
        
        <main class="conteudo">
            <section class="hero">
                <div class="hero__container">
                    <h1 class="hero__title">CONTROLE DE ACESSO</h1>
                    
                    <form action="#" method="GET">
                        <input type="hidden" value="oi" name="msg">
                        <fieldset>
                            <legend>LOGIN</legend>
                    <div>
                        <label for="idEmail">Email</label>
                        <input type="email" name="email" id="idEmail" placeholder="Digite seu email" required minlength="15" maxlength="150" oninvalid="setCustomValidity('Errei')"
                        autocomplete="current-password">
                    </div>
                    <div>
                        <label for="idSenha">Senha</label>
                        <input type="password" name="senha" id="idSenha" placeholder="Digite sua senha" required minlength="5" maxlength="30"
                        autocomplete="current-password">
                    </div>
                    <div>
                        <button type="submit" id="btnEntrar">Entrar</button>
                    </div>
                </fieldset>
            </form>

           
          <a aria-label="Para se cadastrar no sistema." class="hero__btn" href="./cadastro.html">clique aqui</a>
        </div>
      </section>
    </main>

    <footer>
      <p>Esporte Total - 2026 &copy; Todos os direitos reservados</p>
    </footer>
  </body>
</html>
